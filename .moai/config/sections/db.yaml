# Database Documentation Configuration
# Controls /moai db workflow, auto-sync hook, and schema documentation policy.
#
# Structure: 8 keys directly under `db:` (REQ-010)
#   - 5 system-fixed keys: enabled, dir, auto_sync, migration_patterns, engine
#   - 3 interview-input keys: orm, multi_tenant, migration_tool (filled by `/moai db init`)

db:
  # [System] Enabled when /moai db init has run. Firebase/Firestore canonical (ADR-020).
  enabled: true

  # [System] Documentation folder (relative to project root)
  dir: ".moai/project/db"

  # [System] Automatic schema sync on migration file changes
  auto_sync:
    enabled: true
    debounce_seconds: 10
    require_user_approval: true
    excluded_patterns:
      - ".moai/project/db/**"
      - ".moai/cache/**"
      - "**/*.lock"

  # [System] Schema/rule file detection globs (PostToolUse matcher references these)
  # Firestore has no SQL migrations; data model, authorization, and indexes live in
  # rules + index manifests + Cloud Functions (ADR-020). Changes here drive doc auto-sync.
  migration_patterns:
    - "firestore.rules"
    - "firestore.indexes.json"
    - "storage.rules"
    - "functions/**/*.ts"
    - "functions/**/*.js"

  # [System] Primary database engine — Cloud Firestore (NoSQL document store, ADR-020)
  engine: "Firestore"

  # [Interview] ORM/ODM — Firestore has no ORM; access via Firebase SDK port/adapter (ADR-020 14)
  orm: "Firebase SDK"

  # [Interview] Multi-tenant strategy (set during /moai db init interview)
  multi_tenant: "none"

  # [Interview] Migration tool — Firebase CLI deploy of rules + indexes (no SQL migrations)
  migration_tool: "Firebase (firestore.rules + firestore.indexes.json deploy)"
