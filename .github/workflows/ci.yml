# CI Pipeline — Boilerplate Quality Gates
# Referans: 15-quality-gates-and-ci-rules.md
#
# Bu workflow hem docs-only canonical repoda hem bootstrap edilmiş derived project'te güvenli çalışır.
# Derived project'te .github/workflows/ci.yml olarak kopyalanır.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  repo-mode:
    name: Detect Repo Mode
    runs-on: ubuntu-latest
    outputs:
      bootstrap_ready: ${{ steps.detect.outputs.bootstrap_ready }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        shell: bash
        run: |
          if [ -f package.json ] && [ -f pnpm-lock.yaml ] && [ -f pnpm-workspace.yaml ]; then
            echo "bootstrap_ready=true" >> "$GITHUB_OUTPUT"
            echo "Repo mode: bootstrap-ready"
          else
            echo "bootstrap_ready=false" >> "$GITHUB_OUTPUT"
            echo "Repo mode: docs-only / pre-bootstrap"
          fi

  docs-sanity:
    name: Docs Sanity
    needs: repo-mode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Recursive markdown link and filename token check
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re, sys

          root = Path('.').resolve()
          md_files = [p for p in root.rglob('*.md') if '.git' not in p.parts and 'node_modules' not in p.parts]
          all_files = {str(p.relative_to(root)) for p in root.rglob('*') if p.is_file()}
          base_map = {}
          for rel in all_files:
              base_map.setdefault(Path(rel).name, []).append(rel)

          link_re = re.compile(r'\[[^\]]+\]\(([^)]+)\)')
          token_re = re.compile(r'(?<![\w/.-])([A-Za-z0-9._/-]+\.md)\b')
          allow_missing = {
              'BOUNDARY.md', 'DESIGN.md', 'project/project-charter.md',
              'SPEC-001.md', 'SPEC-002.md', 'SPEC-015.md',
              'TEAM_GUIDE.md', '.agents.md', 'tokens.radius.md', 'tokens.shadow.md',
              'docs/ai-guardrails/domain/D-XXX-alan-adi.md',
              'docs/ai-guardrails/activity/A-XXX-aktivite-adi.md',
              'docs/ai-guardrails/project/GP-XXX-alan-adi.md',
              'docs/ai-guardrails/activity/A-XXX.md',
              'docs/ai-guardrails/domain/D-XXX.md',
              'docs/ai-guardrails/project/GP-XXX.md',
              '/SKILL.md', './DESIGN.md', 'Stitch/DESIGN.md',
              'product.md', 'structure.md', 'tech.md',
          }

          errors = []
          for path in md_files:
              text = path.read_text(encoding='utf-8', errors='ignore')
              for target in link_re.findall(text):
                  if '://' in target or target.startswith('#') or target.startswith('mailto:'):
                      continue
                  target = target.split('#')[0]
                  if not target:
                      continue
                  resolved = (path.parent / target).resolve()
                  try:
                      rel = str(resolved.relative_to(root))
                  except Exception:
                      errors.append(f'{path.relative_to(root)}: repo dışına çıkan link -> {target}')
                      continue
                  if rel not in all_files:
                      errors.append(f'{path.relative_to(root)}: kırık markdown link -> {target}')
              for tok in token_re.findall(text):
                  if tok in allow_missing or tok.startswith('http'):
                      continue
                  name = Path(tok).name
                  if name not in base_map:
                      errors.append(f'{path.relative_to(root)}: bulunamayan dosya tokeni -> {tok}')

          if errors:
              print(*sorted(set(errors)), sep='\n')
              sys.exit(1)
          print('Docs sanity check passed')
          PY

  repo-not-bootstrapped:
    name: Repo Not Bootstrapped
    needs: repo-mode
    if: needs.repo-mode.outputs.bootstrap_ready != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only / pre-bootstrap repo detected. Code quality jobs intentionally skipped."

  setup:
    name: Setup
    needs: repo-mode
    if: needs.repo-mode.outputs.bootstrap_ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  typecheck:
    name: TypeCheck
    needs: [repo-mode, setup]
    if: needs.repo-mode.outputs.bootstrap_ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm typecheck

  lint:
    name: Lint
    needs: [repo-mode, setup]
    if: needs.repo-mode.outputs.bootstrap_ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm lint

  test:
    name: Test
    needs: [repo-mode, setup]
    if: needs.repo-mode.outputs.bootstrap_ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm test

  build:
    name: Build
    needs: [repo-mode, typecheck, lint, test]
    if: needs.repo-mode.outputs.bootstrap_ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm build

  boundary:
    name: Boundary Check
    needs: [repo-mode, setup]
    if: needs.repo-mode.outputs.bootstrap_ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Import direction validation
        shell: bash
        run: |
          echo "=== Boundary Check: packages/ → apps/ import taraması ==="
          VIOLATIONS=$(grep -r "from ['"].*apps/" packages/ --include="*.ts" --include="*.tsx" 2>/dev/null || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ BOUNDARY İHLALİ: packages/ → apps/ yönünde import tespit edildi:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ Boundary check geçti — ihlal yok"

  security:
    name: Security Scan
    needs: [repo-mode, setup]
    if: needs.repo-mode.outputs.bootstrap_ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Dependency security audit
        run: pnpm audit --audit-level=high
      - name: Secret leak detection
        shell: bash
        run: |
          echo "=== Secret Leak Taraması ==="
          LEAKS=$(grep -r -E "(api_key|apikey|secret_key|password|token)\s*[:=]\s*['"][^'"]{8,}" --include="*.ts" --include="*.tsx" --include="*.js" apps/ packages/ 2>/dev/null || true)
          if [ -n "$LEAKS" ]; then
            echo "❌ OLASI SECRET LEAK TESPİT EDİLDİ:"
            echo "$LEAKS"
            exit 1
          fi
          echo "✅ Secret leak taraması geçti"
